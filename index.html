<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
</head>

<body>
    <div class="rescue-container">
        <div class="hero-bar">
            <div class="logo-area">
                <div class="university-emblem">
                    <img src="logo.png" alt="Bukkali State University Logo" style="
                height: 60px;
                width: auto;
                border-radius: 12px;
                border: 1px solid #ff4a4a;
                background: #0b0d2c;
                padding: 5px 12px;
              " />
                    <div class="uni-name">NORTHERN BUKIDNON STATE COLLEGE</div>
                    <div class="uni-college">QUICK RESPONSE TEAM · 2023</div>
                </div>
                <div class="logo-text">
                    <h1>LIFELINE <span style="color: #0400ff">NBSC</span></h1>
                    <p>emergency monitoring · rescue system</p>
                </div>
            </div>
            <div class="emergency-badge">
                <i class="fa-solid fa-truck-medical"></i> 24/7 DISPATCH | ACTIVE FLOOD
                ALERT
            </div>

            <div id="authSection">

                <div class="main-panel">
                    <div class="auth-box">
            <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login"><i class="fa-solid fa-key"></i> LOGIN</button>
          <button class="tab-btn" data-tab="register"><i class="fa-solid fa-file-signature"></i> REGISTER</button>
           </div>










                   <!-- LOGIN -->
        <div id="loginForm" class="auth-form active-form">
          <form id="loginFormElement">
            <div class="input-group">
              <label>IDENTIFIER (EMAIL / USERNAME)</label>
              <div class="input-icon">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="loginIdentifier" placeholder="e.g., john.doe@rescue.org or username" autocomplete="username">
              </div>
            </div>
            <div class="input-group">
              <label>ACCESS CODE</label>
              <div class="input-icon">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password">
              </div>
            </div>
            <button type="submit" class="btn-rescue"><i class="fa-solid fa-arrow-right-to-bracket"></i> DEPLOY LOGIN</button>
          </form>
          <div class="switch-message">First time? <span class="switch-link" data-switch="register">Create emergency profile →</span></div>
          <div id="loginMessage" style="margin-top: 14px; font-size:0.8rem; text-align:center; color:#bd6232;"></div>
        </div>
           


                    </div>
                </div>

            </div>



        </div>
    </div>
</body>

</html>
